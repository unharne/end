<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Минималистичный Чат</title>
    <style>
        /* --- Notion Style Variables & Reset --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --secondary-text: #787774;
            --border-color: #ededed;
            --hover-color: #f1f1f0;
            --accent-color: #2383e2; /* Notion blue */
            /* System font stack used by Notion */
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-stack);
            color: var(--text-color);
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- Welcome / Nickname Screen --- */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        #welcome-screen h1 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        #welcome-screen p { color: var(--secondary-text); margin-bottom: 30px; max-width: 400px; }

        .notion-input-group {
            display: flex; gap: 8px; width: 100%; max-width: 400px;
        }

        /* --- Main Chat App Layout --- */
        #chat-app {
            display: none; /* Hidden until nickname set */
            flex-direction: column;
            width: 100%;
            max-width: 900px; /* PC layout limitation */
            height: 100%;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        /* Top Header */
        #chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600;
        }
        #status { font-size: 0.8rem; font-weight: 400; }
        .status-online { color: #0b824c; }
        .status-offline { color: #d44c47; }

        /* Messages Area */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styling (Notion-like) */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #d3d3d3; border-radius: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }

        /* Message Block Styling */
        .message-block {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            gap: 12px;
        }

        .avatar {
            width: 28px; height: 28px;
            border-radius: 4px;
            background-color: var(--hover-color);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; color: var(--secondary-text);
            font-size: 0.9rem; text-transform: uppercase;
            flex-shrink: 0; margin-top: 2px;
        }

        .msg-content-wrapper { display: flex; flex-direction: column; flex: 1; }

        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
        .msg-username { font-weight: 600; font-size: 0.95rem; }
        .msg-time { font-size: 0.75rem; color: var(--secondary-text); }

        .msg-text {
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap; /* Respect newlines */
        }

        /* Special style for your own messages */
        .my-message .msg-username { color: var(--accent-color); }
        .system-message {
            text-align: center; color: var(--secondary-text);
            font-size: 0.8rem; margin: 10px 0; font-style: italic;
        }

        /* Bottom Input Area */
        #input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex; gap: 10px;
            background: white;
        }

        /* --- Notion UI Elements --- */
        .notion-input {
            flex: 1;
            padding: 8px 12px;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.1s;
        }
        .notion-input:focus { border-color: #83bfff; box-shadow: 0 0 0 3px rgba(35, 131, 226, 0.1); }

        .notion-btn {
            padding: 8px 16px;
            font-family: var(--font-stack);
            font-size: 0.95rem; font-weight: 500;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s;
            color: var(--text-color);
        }
        .notion-btn:hover { background-color: var(--hover-color); }
        .notion-btn-primary {
            background-color: var(--accent-color);
            color: white; border-color: var(--accent-color);
        }
        .notion-btn-primary:hover { background-color: #0066cc; }


        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            #chat-app {
                max-width: 100%;
                border-left: none; border-right: none;
            }
            #chat-header { padding: 10px 15px; }
            #chat-box { padding: 15px; }
            #input-area { padding: 10px 15px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
            .notion-input-group { flex-direction: column; }
            .notion-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Экран выбора ника -->
    <div id="welcome-screen">
        <h1>👋 Привет</h1>
        <p>Добро пожаловать в анонимный чат в стиле Notion. Пожалуйста, введите свой никнейм, чтобы начать общение.</p>
        <div class="notion-input-group">
            <input type="text" id="nickname-input" class="notion-input" placeholder="Например, Алексей" maxlength="20" onkeypress="handleJoinPress(event)">
            <button onclick="joinChat()" class="notion-btn notion-btn-primary">Войти в чат</button>
        </div>
    </div>

    <!-- Основное приложение чата (скрыто изначально) -->
    <div id="chat-app">
        <div id="chat-header">
            <div id="chat-title"># Общий канал</div>
            <div id="status">Загрузка...</div>
        </div>

        <div id="chat-box">
            <!-- Сюда добавляются сообщения -->
        </div>

        <div id="input-area">
            <input type="text" id="message-input" class="notion-input" placeholder="Напишите сообщение... (Enter для отправки)" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="notion-btn">Отправить</button>
        </div>
    </div>

    <script>
        // --- Конфигурация ---
        // ВАЖНО: Замените на URL вашего Render сервиса
        const WS_URL = 'end-jq7q.onrender.com';

        // --- Переменные состояния ---
        let ws;
        let myNickname = '';
        let isConnected = false;

        // --- Элементы UI ---
        const ui = {
            welcome: document.getElementById('welcome-screen'),
            chatApp: document.getElementById('chat-app'),
            nickInput: document.getElementById('nickname-input'),
            box: document.getElementById('chat-box'),
            msgInput: document.getElementById('message-input'),
            status: document.getElementById('status')
        };

        // --- Логика входа ---
        function joinChat() {
            const nick = ui.nickInput.value.trim();
            if (!nick) {
                alert("Пожалуйста, введите никнейм.");
                return;
            }
            myNickname = nick;
            ui.welcome.style.display = 'none';
            ui.chatApp.style.display = 'flex';
            connect();
            ui.msgInput.focus();
        }

        function handleJoinPress(e) { if (e.key === 'Enter') joinChat(); }

        // --- Вспомогательные функции UI ---
        function setStatus(text, type) {
            ui.status.textContent = text;
            ui.status.className = type === 'online' ? 'status-online' : 'status-offline';
        }

        function formatTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Рендеринг одного блока сообщения
        function appendMessageBlock(nick, text, isMyOwn, isSystem = false) {
            if (isSystem) {
                const sysDiv = document.createElement('div');
                sysDiv.className = 'system-message';
                sysDiv.textContent = text;
                ui.box.appendChild(sysDiv);
            } else {
                const mainDiv = document.createElement('div');
                mainDiv.className = `message-block ${isMyOwn ? 'my-message' : ''}`;

                // Аватар (первая буква ника)
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = nick.substring(0, 1);

                const contentWrapper = document.createElement('div');
                contentWrapper.className = 'msg-content-wrapper';

                const header = document.createElement('div');
                header.className = 'msg-header';
                
                const uName = document.createElement('span');
                uName.className = 'msg-username';
                uName.textContent = nick;

                const time = document.createElement('span');
                time.className = 'msg-time';
                time.textContent = formatTime();

                header.appendChild(uName);
                header.appendChild(time);

                const txt = document.createElement('div');
                txt.className = 'msg-text';
                txt.textContent = text;

                contentWrapper.appendChild(header);
                contentWrapper.appendChild(txt);

                mainDiv.appendChild(avatar);
                mainDiv.appendChild(contentWrapper);
                
                ui.box.appendChild(mainDiv);
            }
            
            // Авто-скролл вниз
            ui.box.scrollTop = ui.box.scrollHeight;
        }

        // --- Логика WebSocket ---
        function connect() {
            setStatus('Подключение...', 'offline');
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                isConnected = true;
                setStatus('● В сети', 'online');
                appendMessageBlock('', 'Вы присоединились к чату.', false, true);
            };

            ws.onmessage = (event) => {
                try {
                    // Парсим JSON от сервера
                    const data = JSON.parse(event.data);
                    // Отрисовываем сообщение от другого пользователя
                    appendMessageBlock(data.user, data.text, false);
                } catch (e) {
                    console.error("Ошибка парсинга сообщения:", e);
                }
            };

            ws.onclose = () => {
                isConnected = false;
                setStatus('○ Отключен', 'offline');
                appendMessageBlock('', 'Соединение потеряно. Попытка переподключения...', false, true);
                // Простая логика переподключения через 5 секунд
                setTimeout(connect, 5000);
            };

            ws.onerror = (err) => {
                console.error('Ошибка WebSocket:', err);
                ws.close();
            };
        }

        function sendMessage() {
            const text = ui.msgInput.value.trim();
            if (text && isConnected) {
                // Создаем структуру данных
                const messageObj = {
                    user: myNickname,
                    text: text
                };
                
                // Конвертируем в строку и отправляем
                ws.send(JSON.stringify(messageObj));
                
                // Сразу отрисовываем у себя (чтобы чат казался быстрее)
                appendMessageBlock(myNickname, text, true);
                
                ui.msgInput.value = '';
                ui.msgInput.focus();
            }
        }

        function handleKeyPress(e) {
            // Enter отправляет, Shift+Enter создает новую строку (стандарт Notion)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
